<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>빌 캠벨 코칭 허브</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏈</text></svg>">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:#f0f4f8;color:#1a202c;overflow-x:hidden}
#root{min-height:100vh}
.app{min-height:100vh;display:flex;flex-direction:column}
.app.mobile{max-width:480px;margin:0 auto;background:#f0f4f8}
.app.desktop{flex-direction:row}

/* DESKTOP SIDEBAR */
.sidebar{display:none;width:260px;background:#1e3a5f;color:#fff;position:fixed;left:0;top:0;height:100vh;padding:24px 0;overflow-y:auto;z-index:1000}
.app.desktop .sidebar{display:flex;flex-direction:column}
.sidebar-logo{padding:0 18px;margin-bottom:24px;text-align:center}
.sidebar-logo h1{font-size:14px;font-weight:800}
.sidebar-logo p{font-size:11px;opacity:.7;margin-top:4px}
.sidebar-nav{flex:1}
.sidebar-section{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-section:last-child{border-bottom:none}
.sidebar-section-title{font-size:10px;font-weight:800;letter-spacing:.5px;opacity:.5;padding:0 18px;margin-bottom:8px;text-transform:uppercase}
.sidebar-item{padding:10px 18px;font-size:13px;cursor:pointer;color:rgba(255,255,255,.8);transition:all .2s;display:flex;gap:10px;align-items:center}
.sidebar-item:hover{background:rgba(255,255,255,.1);color:#fff}
.sidebar-item.on{background:rgba(0,180,216,.3);color:#fff}
.sidebar-item-icon{font-size:16px}
.sidebar-bottom{padding:18px;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-user{font-size:12px;color:rgba(255,255,255,.9)}
.sidebar-user-role{font-size:10px;opacity:.6;margin-top:2px}

/* DESKTOP TOPBAR */
.topbar{display:none;background:linear-gradient(135deg,#1e3a5f 0%,#0a5c7d 100%);color:#fff;padding:14px 20px;position:sticky;top:0;z-index:99;align-items:center;gap:16px}
.app.desktop .topbar{display:flex}
.topbar-title{font-size:16px;font-weight:700;flex-shrink:0}
.topbar-search{flex:1;max-width:300px}
.topbar-search input{width:100%;padding:8px 14px;border:none;border-radius:8px;font-size:13px;background:rgba(255,255,255,.15);color:#fff}
.topbar-search input::placeholder{color:rgba(255,255,255,.5)}
.topbar-actions{display:flex;gap:10px;flex-shrink:0}

/* MAIN CONTENT */
.main-content{flex:1}
.app.mobile .main-content{padding-bottom:110px}
.app.desktop .main-content{margin-left:260px}

/* AUTH */
.auth-bg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#1e3a5f 0%,#0a5c7d 60%,#00b4d8 100%);padding:24px}
.auth-card{background:#fff;border-radius:24px;padding:32px 24px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.35)}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo .logo-icon{width:72px;height:72px;border-radius:50%;object-fit:cover;margin-bottom:10px;border:3px solid #e2e8f0}
.auth-logo h1{font-size:22px;font-weight:800;color:#1e3a5f}
.auth-logo p{font-size:12px;color:#718096;margin-top:4px;line-height:1.5}
.auth-legend{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.auth-legend-tag{font-size:10px;font-weight:700;background:#ebf8ff;color:#2b6cb0;padding:3px 8px;border-radius:12px}
.auth-tabs{display:flex;background:#f0f4f8;border-radius:12px;padding:4px;margin-bottom:20px}
.auth-tab{flex:1;padding:10px;border:none;background:none;border-radius:8px;font-size:14px;font-weight:600;color:#718096;cursor:pointer;transition:all .2s}
.auth-tab.on{background:#fff;color:#1e3a5f;box-shadow:0 2px 8px rgba(0,0,0,.1)}

/* FORM */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:700;color:#4a5568;margin-bottom:5px;letter-spacing:.3px}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:12px;font-size:14px;color:#1a202c;transition:border-color .2s;background:#fff;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#1e3a5f;box-shadow:0 0 0 3px rgba(30,58,95,.08)}
.fg textarea{resize:vertical;min-height:72px;line-height:1.6}
.fg-row{display:flex;gap:10px}.fg-row .fg{flex:1}
.fg-hint{font-size:11px;color:#a0aec0;margin-top:4px}
.err{color:#e53e3e;font-size:12px;margin-top:6px}

/* BUTTONS */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;text-align:center}
.btn-primary{background:#1e3a5f;color:#fff}.btn-primary:hover{background:#163052;transform:translateY(-1px);box-shadow:0 6px 16px rgba(30,58,95,.3)}
.btn-ghost{background:#f0f4f8;color:#4a5568;margin-top:8px}.btn-ghost:hover{background:#e2e8f0}
.btn-accent{background:#00b4d8;color:#fff}.btn-accent:hover{background:#0096b5}
.btn-sm{width:auto;display:inline-block;padding:8px 16px;font-size:13px}
.btn-danger{background:#fff5f5;color:#e53e3e;border:1px solid #fed7d7}
.btn-outline{background:transparent;border:2px solid #e2e8f0;color:#4a5568}
.btn-outline.on{border-color:#1e3a5f;color:#1e3a5f;background:#ebf8ff}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1e3a5f 0%,#0a5c7d 100%);color:#fff;padding:18px 18px 22px;position:relative;display:flex;gap:14px;align-items:center}
.hdr-avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3);flex-shrink:0}
.hdr-info{flex:1;min-width:0}
.hdr-brand{font-size:11px;opacity:.7;font-weight:600;letter-spacing:.3px}
.hdr-name{font-size:20px;font-weight:800;line-height:1.2;margin-top:2px}
.hdr-sub{font-size:12px;opacity:.65;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-actions{display:flex;gap:6px;flex-shrink:0;flex-direction:column;align-items:flex-end}
.hdr-btn{font-size:11px;background:rgba(255,255,255,.18);border:none;color:#fff;padding:5px 10px;border-radius:16px;cursor:pointer}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 14px;margin:14px 0}
.app.desktop .stats{grid-template-columns:repeat(4,1fr)}
.sc{background:#fff;border-radius:14px;padding:12px 8px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.sc-num{font-size:24px;font-weight:800;color:#1e3a5f;line-height:1}
.sc-lbl{font-size:10px;color:#718096;margin-top:3px}
.sc-sub{font-size:10px;font-weight:700;margin-top:2px}
.sc-sub.good{color:#38a169}.sc-sub.warn{color:#dd6b20}.sc-sub.muted{color:#a0aec0}

/* CONTENT */
.content{padding:0 14px 110px}
.app.desktop .content{padding:0 20px 40px;padding-bottom:40px}
.app.desktop .content-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.app.desktop .content-main{flex:1}
.app.desktop .content-side{flex:1}

/* SECTION */
.sec{margin-bottom:18px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-title{font-size:15px;font-weight:700}
.sec-link{font-size:12px;color:#00b4d8;font-weight:700;background:none;border:none;cursor:pointer}

/* CARD */
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;transition:transform .15s}
.card:hover{transform:translateY(-1px)}
.card-row{display:flex;justify-content:space-between;align-items:flex-start}
.card-name{font-size:14px;font-weight:700}.card-date{font-size:11px;color:#718096}
.card-topic{font-size:13px;color:#4a5568;margin-top:4px;line-height:1.5}
.card-footer{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}

/* BADGE */
.badge{font-size:10px;padding:3px 8px;border-radius:16px;font-weight:700}
.b-blue{background:#ebf8ff;color:#2b6cb0}.b-green{background:#f0fff4;color:#276749}
.b-orange{background:#fffaf0;color:#c05621}.b-red{background:#fff5f5;color:#c53030}
.b-purple{background:#faf5ff;color:#553c9a}.b-yellow{background:#fffff0;color:#744210}

/* BILL CAMPBELL INTRO */
.bill-intro{background:linear-gradient(135deg,#1565c0 0%,#1e3a5f 100%);border-radius:16px;padding:0;margin-bottom:16px;overflow:hidden;box-shadow:0 4px 20px rgba(21,101,192,.3)}
.bill-intro-inner{display:flex;align-items:stretch;gap:0}
.bill-intro-img-wrap{flex-shrink:0;width:115px;position:relative;overflow:hidden;background:#0d3b7a;min-height:148px}
.app.desktop .bill-intro-img-wrap{width:150px;min-height:200px}
.bill-intro-svg{display:block;width:115px;height:148px}
.app.desktop .bill-intro-svg{width:150px;height:200px}
.bill-intro-text{flex:1;padding:18px 16px;color:#fff}
.app.desktop .bill-intro-text{padding:24px 20px}
.bill-intro-tag{font-size:10px;font-weight:800;letter-spacing:.5px;opacity:.65;text-transform:uppercase;margin-bottom:5px}
.bill-intro-headline{font-size:12px;font-weight:700;line-height:1.6;margin-bottom:5px;opacity:.88}
.bill-intro-name{font-size:24px;font-weight:900;margin-bottom:8px;letter-spacing:-.5px;line-height:1.1}
.app.desktop .bill-intro-name{font-size:32px}
.bill-intro-divider{width:32px;height:2px;background:rgba(255,255,255,.4);margin-bottom:8px}
.bill-intro-desc{font-size:11px;line-height:1.7;opacity:.78}

/* LEGEND CARD */
.legend-card{background:linear-gradient(135deg,#0f2444 0%,#1a3a6b 100%);border-radius:16px;padding:16px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden}
.legend-card::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.04)}
.legend-card-title{font-size:11px;font-weight:800;letter-spacing:.5px;opacity:.6;text-transform:uppercase;margin-bottom:10px}
.legend-row{display:flex;gap:8px;margin-bottom:8px}
.legend-item{flex:1;background:rgba(255,255,255,.08);border-radius:10px;padding:10px 8px;text-align:center}
.legend-item-icon{font-size:20px;margin-bottom:4px}
.legend-item-name{font-size:11px;font-weight:800;color:#fff}
.legend-item-role{font-size:9px;opacity:.6;margin-top:2px;line-height:1.4}
.legend-quote{font-size:11px;line-height:1.7;opacity:.8;border-top:1px solid rgba(255,255,255,.12);padding-top:10px;margin-top:4px;font-style:italic}
.legend-quote-src{font-size:10px;opacity:.5;margin-top:4px;text-align:right}

/* MARKETING BANNER */
.mkt-banner{background:linear-gradient(135deg,#f6ad55,#ed8936);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.mkt-banner-icon{font-size:28px;flex-shrink:0}
.mkt-banner-text{flex:1}
.mkt-banner-title{font-size:13px;font-weight:800;color:#7b341e;margin-bottom:2px}
.mkt-banner-desc{font-size:11px;color:#7b341e;opacity:.85;line-height:1.5}

/* MOTIVATION SECTION */
.moti-box{background:#fff;border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.moti-title{font-size:16px;font-weight:800;color:#1e3a5f;text-align:center;margin-bottom:14px}
.moti-compare{display:flex;gap:10px}
.moti-col{flex:1;border-radius:12px;padding:14px 10px;text-align:center}
.moti-col.old{background:#fff5f5;border:2px solid #fed7d7}
.moti-col.new{background:#f0fff4;border:2px solid #c6f6d5}
.moti-col h4{font-size:13px;font-weight:800;margin-bottom:8px}
.moti-col.old h4{color:#e53e3e}.moti-col.new h4{color:#38a169}
.moti-col ul{list-style:none;text-align:left;font-size:12px;line-height:1.8;color:#4a5568}
.moti-col ul li::before{content:'• ';font-weight:700}
.moti-col.old ul li::before{color:#e53e3e}.moti-col.new ul li::before{color:#38a169}
.moti-vs{display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#1e3a5f;margin:8px 0}

/* GROW MODEL */
.grow-card{background:linear-gradient(135deg,#f0fff4,#ebf8ff);border-radius:16px;padding:18px;margin-bottom:16px;border:2px solid #e2e8f0}
.grow-steps{display:flex;gap:6px;margin-bottom:14px}
.grow-step{flex:1;text-align:center;padding:10px 4px;border-radius:10px;cursor:pointer;transition:all .2s;border:2px solid transparent}
.grow-step.on{border-color:#1e3a5f;background:#fff;box-shadow:0 2px 8px rgba(30,58,95,.12)}
.grow-letter{font-size:22px;font-weight:800;line-height:1}
.grow-label{font-size:10px;font-weight:700;color:#718096;margin-top:2px}
.grow-step.g .grow-letter{color:#38a169}.grow-step.r .grow-letter{color:#3182ce}
.grow-step.o .grow-letter{color:#dd6b20}.grow-step.w .grow-letter{color:#805ad5}
.grow-detail{background:#fff;border-radius:12px;padding:14px;margin-top:8px}
.grow-detail h4{font-size:14px;font-weight:700;margin-bottom:6px}
.grow-detail p{font-size:12px;color:#4a5568;line-height:1.6;margin-bottom:8px}
.grow-q{font-size:13px;color:#1e3a5f;font-weight:600;line-height:1.6;padding:6px 0;border-bottom:1px solid #f0f4f8}

/* GROW ACCORDION */
.grow-accordion{background:#fff;border-radius:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden}
.grow-acc-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;background:linear-gradient(135deg,#f0fff4,#ebf8ff);border-bottom:1px solid #e2e8f0}
.grow-acc-title{font-size:14px;font-weight:800;color:#1e3a5f}
.grow-acc-toggle{font-size:18px;color:#718096;transition:transform .2s}
.grow-acc-toggle.open{transform:rotate(180deg)}
.grow-acc-body{padding:14px 16px}

/* QUOTE */
.qcard{background:linear-gradient(135deg,#1e3a5f,#0a5c7d);color:#fff;border-radius:16px;padding:20px;margin-bottom:16px}
.qcard-text{font-size:14px;line-height:1.8;font-style:italic;margin-bottom:8px}
.qcard-author{font-size:11px;opacity:.65;text-align:right}

/* TODAY Q */
.tq{background:#fffff0;border:2px solid #f6e05e;border-radius:14px;padding:14px;margin-bottom:16px}
.tq-lbl{font-size:10px;font-weight:800;color:#744210;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.tq-text{font-size:15px;font-weight:700;color:#1a202c;line-height:1.5}

/* PROGRESS */
.prog-wrap{background:#e2e8f0;border-radius:99px;height:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#00b4d8,#52b788);transition:width .6s}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e2e8f0;display:flex;padding:6px 0 env(safe-area-inset-bottom,6px);box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:100}
.app.desktop .bnav{display:none}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:5px 0;cursor:pointer;border:none;background:none}
.ni-icon{font-size:20px;margin-bottom:1px}.ni-lbl{font-size:9px;color:#a0aec0;font-weight:700}
.ni.on .ni-lbl{color:#1e3a5f}
.ni.on .ni-icon{filter:drop-shadow(0 0 3px rgba(30,58,95,.3))}

/* FAB */
.fab{position:fixed;bottom:74px;right:calc(50% - 215px);width:52px;height:52px;border-radius:50%;background:#00b4d8;color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(0,180,216,.45);display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:99;line-height:1}
.fab:hover{background:#0096b5;transform:scale(1.07)}
.app.desktop .fab{bottom:auto;right:auto;position:absolute;top:14px;right:20px}
@media(max-width:480px){.fab{right:16px}}

/* SCREEN */
.scr{padding:14px 14px 110px}
.scr-hdr{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-top:4px}
.back{font-size:22px;background:none;border:none;cursor:pointer;color:#4a5568;padding:2px 6px 2px 0}
.scr-title{font-size:18px;font-weight:800}

/* MOOD */
.mood-row{display:flex;gap:8px}
.mood-btn{flex:1;padding:12px 4px;border:2px solid #e2e8f0;border-radius:12px;cursor:pointer;text-align:center;background:#fff;transition:all .15s}
.mood-btn.on{border-color:#1e3a5f;background:#ebf8ff}
.mood-emoji{font-size:24px;display:block}.mood-lbl{font-size:10px;color:#718096;display:block;margin-top:3px;font-weight:600}

/* RANGE */
input[type=range]{width:100%;cursor:pointer;accent-color:#1e3a5f}
.range-lbl{display:flex;justify-content:space-between;font-size:10px;color:#a0aec0;margin-top:4px}
.ratio-preview{text-align:center;font-size:20px;font-weight:800;color:#1e3a5f;margin:4px 0}

/* OVERLAY / SHEET */
.overlay{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:100vh;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:18px;width:100%;max-height:82vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 16px}
.dr{margin-bottom:12px}.dr-lbl{font-size:10px;font-weight:700;color:#a0aec0;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}.dr-val{font-size:13px;color:#1a202c;line-height:1.6}
.sheet-actions{display:flex;gap:8px;margin-top:16px}.sheet-actions .btn{flex:1}

/* CALENDAR */
.cal{background:#fff;border-radius:14px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px}
.cal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cal-title{font-size:14px;font-weight:700;color:#1e3a5f}
.cal-nav{background:none;border:none;font-size:18px;cursor:pointer;color:#4a5568;padding:2px 8px}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:10px;font-weight:700;color:#a0aec0;margin-bottom:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;gap:2px}
.cal-cell{height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:12px;cursor:pointer;transition:all .15s;color:#4a5568;position:relative}
.cal-cell:hover{background:#f0f4f8}.cal-cell.today{font-weight:700;color:#1e3a5f}
.cal-cell.has{background:#ebf8ff;color:#2b6cb0;font-weight:700}
.cal-cell.has::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:#00b4d8}
.cal-cell.sel{background:#1e3a5f;color:#fff}.cal-cell.sel::after{background:#fff}
.cal-cell.empty{cursor:default;pointer-events:none}

/* TIMELINE */
.tl-item{display:flex;gap:12px;margin-bottom:14px}
.tl-dot{width:34px;height:34px;border-radius:50%;background:#1e3a5f;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tl-body{flex:1;padding-top:2px}.tl-month{font-size:13px;font-weight:700;color:#1e3a5f}
.tl-stats{font-size:11px;color:#718096;margin-top:2px}
.tl-line{width:2px;background:#e8ecf0;height:14px;margin-left:16px}

/* GROWTH BADGES */
.gbadge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.app.desktop .gbadge-grid{grid-template-columns:repeat(5,1fr)}
.gbadge{background:#fff;border-radius:12px;padding:12px 6px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.06);transition:transform .15s}
.gbadge.earned:hover{transform:translateY(-2px)}.gbadge.locked{opacity:.35;filter:grayscale(1)}
.gb-icon{font-size:26px;display:block;margin-bottom:4px}
.gb-name{font-size:10px;font-weight:800;color:#1a202c}
.gb-desc{font-size:9px;color:#718096;margin-top:2px;line-height:1.3}

/* QUESTION CARDS */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-ms-overflow-style:none;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.app.desktop .filter-row{flex-wrap:wrap;overflow-x:visible}
.ftag{padding:5px 12px;border-radius:18px;border:1.5px solid #e2e8f0;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;background:#fff;color:#4a5568;transition:all .15s}
.ftag.on{background:#1e3a5f;color:#fff;border-color:#1e3a5f}
.qc{background:#fff;border-radius:14px;padding:16px;margin-bottom:8px;box-shadow:0 2px 6px rgba(0,0,0,.06);border-left:4px solid #00b4d8}
.app.desktop .qc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.app.desktop .qc{margin-bottom:0}
.qc-text{font-size:14px;color:#1a202c;line-height:1.6;font-weight:500}
.qc-meta{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.qc-tip{font-size:11px;color:#718096;margin-top:6px;line-height:1.5;padding-top:6px;border-top:1px solid #f0f4f8}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}.search-wrap input{padding-left:38px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}

/* EMPTY */
.empty{text-align:center;padding:40px 16px;color:#a0aec0}
.empty-icon{font-size:48px;display:block;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.7}

hr.div{border:none;border-top:1px solid #e2e8f0;margin:16px 0}

/* SUMMARY */
.sum-box{text-align:center;padding:20px;background:linear-gradient(135deg,#ebf8ff,#f0fff4);border-radius:16px;margin-top:8px}
.sum-box .sum-icon{font-size:30px;display:block;margin-bottom:6px}
.sum-box .sum-title{font-size:14px;font-weight:800;color:#1e3a5f}
.sum-box .sum-sub{font-size:11px;color:#718096;margin-top:4px;line-height:1.6}

/* LEVEL SELECTOR */
.lvl-row{display:flex;gap:8px;margin:10px 0}
.lvl-btn{flex:1;padding:10px 4px;border:2px solid #e2e8f0;border-radius:10px;text-align:center;cursor:pointer;background:#fff;transition:all .15s}
.lvl-btn.on{border-color:#1e3a5f;background:#ebf8ff}
.lvl-icon{font-size:20px;display:block}.lvl-label{font-size:10px;font-weight:700;color:#4a5568;margin-top:2px}
.lvl-desc{font-size:9px;color:#a0aec0;margin-top:1px}

/* MYPAGE */
.mp-card{background:#fff;border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.mp-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f4f8}
.mp-row:last-child{border-bottom:none}
.mp-label{font-size:12px;color:#718096;font-weight:600}
.mp-val{font-size:14px;font-weight:700;color:#1a202c}

/* ═══ TROUBLESHOOT ═══ */
.ts-header{background:linear-gradient(135deg,#2d3748 0%,#1a202c 100%);border-radius:16px;padding:16px;margin-bottom:16px;color:#fff}
.ts-header-title{font-size:16px;font-weight:800;margin-bottom:4px}
.ts-header-sub{font-size:11px;opacity:.7;line-height:1.6}
.ts-cat-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-ms-overflow-style:none;scrollbar-width:none}
.ts-cat-row::-webkit-scrollbar{display:none}
.ts-cat{padding:6px 14px;border-radius:20px;border:1.5px solid #e2e8f0;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;background:#fff;color:#4a5568;transition:all .15s}
.ts-cat.on{color:#fff;border-color:transparent}
.ts-card{background:#fff;border-radius:16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);overflow:hidden;cursor:pointer;transition:transform .15s}
.ts-card:hover{transform:translateY(-1px)}
.ts-card-hdr{padding:14px 16px;display:flex;align-items:center;gap:10px}
.ts-card-icon{font-size:24px;flex-shrink:0}
.ts-card-info{flex:1}
.ts-card-cat{font-size:13px;font-weight:800;color:#1a202c}
.ts-card-sit{font-size:11px;color:#718096;margin-top:2px;line-height:1.4}
.ts-card-arrow{font-size:16px;color:#a0aec0;flex-shrink:0}
.ts-card-body{padding:0 16px 16px;border-top:1px solid #f0f4f8;display:none}
.ts-card-body.open{display:block;padding-top:14px}
.ts-section{margin-bottom:12px}
.ts-section-label{font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.ts-bill-box{background:#f8fafc;border-radius:10px;padding:12px;border-left:4px solid #00b4d8}
.ts-bill-text{font-size:13px;color:#1a202c;line-height:1.7;font-style:italic}
.ts-bill-attr{font-size:10px;color:#718096;margin-top:4px;text-align:right}
.ts-steps{list-style:none;counter-reset:step}
.ts-steps li{counter-increment:step;display:flex;gap:8px;margin-bottom:8px;font-size:12px;color:#4a5568;line-height:1.6}
.ts-steps li::before{content:counter(step);min-width:20px;height:20px;border-radius:50%;background:#1e3a5f;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ts-script-box{background:linear-gradient(135deg,#ebf8ff,#e6fffa);border-radius:12px;padding:14px;border:1.5px solid #bee3f8}
.ts-script-text{font-size:13px;color:#1a202c;line-height:1.8;font-weight:500}
.ts-avoid-box{background:#fff5f5;border-radius:10px;padding:10px 12px;border-left:4px solid #fc8181}
.ts-avoid-text{font-size:12px;color:#c53030;line-height:1.6}

@media(max-width:360px){.sc-num{font-size:20px}.hdr-name{font-size:17px}}
.ts-bill-text{white-space:pre-line}
.legend-photo{width:130px;height:auto;border-radius:12px;float:left;margin:0 14px 10px 0;box-shadow:0 4px 12px rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.2)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:42px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;cursor:pointer;color:#718096;padding:2px}

@media(min-width:768px){
  .app.mobile{max-width:none;width:100%}
  .sidebar{display:flex}
  .topbar{display:flex}
  .bnav{display:none}
  .content{padding-bottom:40px}
}

/* ═══ DESKTOP ONLY STYLES ═══ */
.app.desktop{background:#f0f4f8}
.app.desktop .sidebar{width:260px;background:linear-gradient(180deg,#1e3a5f 0%,#0a5c7d 100%);position:fixed;left:0;top:0;height:100vh;flex-direction:column;z-index:1000;padding:24px 0}
.app.desktop .sidebar-logo{padding:0 20px;margin-bottom:24px;text-align:left}
.app.desktop .sidebar-logo h1{font-size:14px;font-weight:800;margin-bottom:4px}
.app.desktop .sidebar-logo p{font-size:11px;opacity:.6}
.app.desktop .sidebar-nav{flex:1;overflow-y:auto}
.app.desktop .sidebar-section{padding:12px 0;border:none;margin-top:8px}
.app.desktop .sidebar-section-title{font-size:10px;font-weight:800;letter-spacing:.5px;opacity:.4;padding:0 20px;margin-bottom:8px;text-transform:uppercase}
.app.desktop .sidebar-item{padding:10px 20px;font-size:13px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:12px;border-radius:8px;cursor:pointer;transition:all .2s;margin:0 12px}
.app.desktop .sidebar-item:hover{background:rgba(255,255,255,.08);color:#fff}
.app.desktop .sidebar-item.on{background:rgba(0,180,216,.3);color:#fff;font-weight:700}
.app.desktop .sidebar-bottom{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1)}
.app.desktop .sidebar-user{font-size:13px;font-weight:700;color:#fff}
.app.desktop .sidebar-user-role{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}

.app.desktop .topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:16px 32px;margin-left:260px;position:sticky;top:0;z-index:99;display:flex;align-items:center;justify-content:space-between;gap:16px}
.app.desktop .topbar-title{font-size:18px;font-weight:800;color:#1a202c}
.app.desktop .topbar-search{flex:1;max-width:300px}
.app.desktop .topbar-search input{width:100%;padding:8px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:13px;background:#fff;color:#1a202c;font-family:inherit}
.app.desktop .topbar-search input:focus{outline:none;border-color:#1e3a5f}
.app.desktop .topbar-search input::placeholder{color:#a0aec0}
.app.desktop .topbar-actions{display:flex;gap:10px;align-items:center}

.app.desktop .main-content{margin-left:260px}
.app.desktop .content{padding:28px 32px;background:#f0f4f8}

.app.desktop .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:0;margin:0 0 28px 0}
.app.desktop .sc{background:#fff;border-radius:14px;padding:20px;text-align:left;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.app.desktop .sc-num{font-size:28px;font-weight:900;color:#1e3a5f;line-height:1}
.app.desktop .sc-lbl{font-size:12px;color:#718096;margin-top:8px;margin-bottom:0}
.app.desktop .sc-sub{font-size:12px;font-weight:600;margin-top:6px}

.app.desktop .hdr{background:linear-gradient(135deg,#1e3a5f 0%,#0a5c7d 100%);color:#fff;padding:18px 32px;margin-left:260px;display:flex;gap:14px;align-items:center;position:sticky;top:52px;z-index:50}
.app.desktop .hdr-avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3)}
.app.desktop .hdr-info{flex:1}
.app.desktop .hdr-brand{font-size:11px;opacity:.7;font-weight:600;letter-spacing:.3px}
.app.desktop .hdr-name{font-size:20px;font-weight:800;line-height:1.2;margin-top:2px}
.app.desktop .hdr-sub{font-size:12px;opacity:.65;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ─── DESKTOP DASHBOARD ─── */
.desk-dash{padding:28px 32px}
.dd-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.dd-card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.05);min-height:130px;display:flex;flex-direction:column;justify-content:center}
.dd-label{font-size:12px;color:#718096;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.dd-value{font-size:28px;font-weight:900;color:#1e3a5f;line-height:1}
.dd-unit{font-size:14px;color:#718096;font-weight:400}
.dd-sub{font-size:12px;font-weight:600;margin-top:6px}
.dd-sub.good{color:#38a169}
.dd-sub.warn{color:#dd6b20}
.dd-sub.info{color:#3182ce}
.dd-sub.muted{color:#a0aec0}
.dd-prog{height:8px;background:#edf2f7;border-radius:8px;overflow:hidden;margin-top:12px}
.dd-prog-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#4facfe,#00f2fe);transition:width .5s}

.dd-question{background:linear-gradient(135deg,#1e3a5f 0%,#0a5c7d 100%);border-radius:16px;padding:24px 28px;color:#fff;margin-bottom:28px;display:flex;align-items:flex-start;gap:16px}
.dd-q-icon{font-size:32px;flex-shrink:0;margin-top:2px}
.dd-q-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.6;margin-bottom:6px}
.dd-q-text{font-size:17px;font-weight:700;line-height:1.5;margin-bottom:8px}
.dd-q-tags{display:flex;gap:6px}
.dd-q-tag{font-size:11px;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:12px}

.dd-two-col{display:grid;grid-template-columns:1.6fr 1fr;gap:20px}
.dd-panel{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.05);overflow:hidden}
.dd-panel-hdr{padding:18px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #edf2f7}
.dd-panel-title{font-size:15px;font-weight:700;color:#1a202c}
.dd-panel-link{font-size:12px;color:#00b4d8;font-weight:700;background:none;border:none;cursor:pointer;font-family:inherit}
.dd-panel-link:hover{text-decoration:underline}

.dd-rec-item{padding:14px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #f7fafc;cursor:pointer;transition:background .15s}
.dd-rec-item:hover{background:#f7fafc}
.dd-rec-item:last-child{border:none}
.dd-rec-mood{font-size:22px;flex-shrink:0}
.dd-rec-info{flex:1;min-width:0}
.dd-rec-name{font-size:14px;font-weight:700;color:#1a202c}
.dd-rec-topic{font-size:12px;color:#718096;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dd-rec-meta{text-align:right;flex-shrink:0}
.dd-rec-date{font-size:12px;color:#a0aec0}
.dd-rec-ratio{font-size:11px;font-weight:700;margin-top:3px}
.dd-rec-ratio.good{color:#38a169}
.dd-rec-ratio.warn{color:#dd6b20}

.dd-badge-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:20px 24px}
.dd-badge{text-align:center;padding:12px 6px;border-radius:10px;background:#f7fafc;transition:transform .15s}
.dd-badge:hover{transform:translateY(-2px)}
.dd-badge.earned{background:#f0fff4;border:1px solid #c6f6d5}
.dd-badge.locked{opacity:.4}
.dd-badge-icon{font-size:24px;display:block;margin-bottom:4px}
.dd-badge-name{font-size:10px;font-weight:700;color:#4a5568}
.dd-badge-desc{font-size:9px;color:#a0aec0;margin-top:2px;line-height:1.3}

.app.desktop .content-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
</style>

function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}
function getMaxMonthly(r){const c={};r.forEach(x=>{const k=x.date.slice(0,7);c[k]=(c[k]||0)+1});return Math.max(0,...Object.values(c))}
function getConsecMonths(r){const ms=[...new Set(r.map(x=>x.date.slice(0,7)))].sort();let mx=1,cur=1;for(let i=1;i<ms.length;i++){const[py,pm]=ms[i-1].split('-').map(Number);const[cy,cm]=ms[i].split('-').map(Number);if((cy*12+cm)-(py*12+pm)===1){cur++;mx=Math.max(mx,cur)}else cur=1}return mx}
function randomQuote(){return QUOTES[Math.floor(Math.random()*QUOTES.length)]}
function todayQuestion(){const non_ice=QUESTIONS.filter(q=>q.cat!=='아이스브레이킹');return non_ice[new Date().getDate()%non_ice.length]}

return(<div className="scr">

    <div style={{fontSize:20,fontWeight:800}}>{me.name} {me.position||'팀장'}</div>
    <div style={{fontSize:13,color:'#718096',marginTop:4}}>{me.company} · {me.team}</div>
  </div>
  {!edit?(<>

      <div className="mp-row"><span className="mp-label">소속 회사</span><span className="mp-val">{me.company}</span></div>

      <div className="mp-row"><span className="mp-label">구성원 수</span><span className="mp-val">{me.memberCount}명</span></div>

    <button className="btn btn-danger" style={{marginTop:8}} onClick={onLogout}>로그아웃</button>
  </>):(<>
    <div className="mp-card">

      <div className="fg"><label>직책</label><select value={f.position||'팀장'} onChange={e=>s('position',e.target.value)}>{POSITIONS.map(p=><option key={p}>{p}</option>)}</select></div>
      <div className="fg"><label>구성원 수</label><input type="number" min="1" max="50" value={f.memberCount} onChange={e=>s('memberCount',Math.max(1,parseInt(e.target.value)||1))}/></div>
      <div className="fg"><label>코칭 레벨</label>
        <div className="lvl-row">{[['🌱','초급'],['🌿','중급'],['🌳','상급']].map(([ic,lv])=><div key={lv} className={`lvl-btn ${f.level===lv?'on':''}`} onClick={()=>s('level',lv)}><span className="lvl-icon">{ic}</span><span className="lvl-label">{lv}</span></div>)}</div>
      </div>
    </div>
    <button className="btn btn-primary" onClick={doSave}>저장하기 ✓</button>
    <button className="btn btn-ghost" onClick={()=>{setF({...me});setEdit(false)}}>취소</button>
  </>)}
</div>);
}

function getTarget(me){
  const mc=me.memberCount||5;
  if(me.level==='상급')return mc*4;
  if(me.level==='중급')return mc*2;
  return mc;
}

/* ═══ MINI CALENDAR ═══ */
function MiniCal({records,selDate,onSelect}){
const[viewMonth,setViewMonth]=useState(()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')});
const[y,m]=[...viewMonth.split('-').map(Number)];
const first=new Date(y,m-1,1);
const days=new Date(y,m,0).getDate();
const startDay=first.getDay();
const today=new Date().toISOString().slice(0,10);
const recDates=new Set(records.map(r=>r.date));
const cells=[];
for(let i=0;i<startDay;i++)cells.push(null);
for(let d=1;d<=days;d++)cells.push(d);
while(cells.length%7!==0)cells.push(null);
if(cells.length>=7&&cells.slice(-7).every(c=>c===null))cells.splice(-7);
function prev(){const nm=m===1?12:m-1;const ny=m===1?y-1:y;setViewMonth(ny+'-'+String(nm).padStart(2,'0'))}
function next(){const nm=m===12?1:m+1;const ny=m===12?y+1:y;setViewMonth(ny+'-'+String(nm).padStart(2,'0'))}
function fmt(d){return viewMonth+'-'+String(d).padStart(2,'0')}
return(<div className="cal">
  <div className="cal-hdr">
    <button className="cal-nav" onClick={prev}>‹</button>
    <span className="cal-title">{y}년 {m}월</span>
    <button className="cal-nav" onClick={next}>›</button>
  </div>
  <div className="cal-days">{['일','월','화','수','목','금','토'].map(d=><div key={d}>{d}</div>)}</div>
  <div className="cal-grid">
    {cells.map((d,i)=>{
      if(!d)return<div key={i} className="cal-cell empty"/>;
      const ds=fmt(d);
      const has=recDates.has(ds);
      const isSel=selDate===ds;
      const isToday=ds===today;
      return<div key={i} className={`cal-cell ${has?'has':''} ${isSel?'sel':''} ${isToday?'today':''}`} onClick={()=>onSelect(isSel?null:ds)}>{d}</div>;
    })}
  </div>
</div>);
}

    <div className="ratio-preview">{f.talkRatio}% {f.talkRatio<=20?'🏆':f.talkRatio<=30?'👍':f.talkRatio<=50?'⚠️':'😅'}</div>
    <input type="range" min="5" max="80" step="5" value={f.talkRatio} onChange={e=>s('talkRatio',parseInt(e.target.value))}/>
    <div className="range-lbl"><span>5% 경청</span><span>목표 20~30%</span><span>80%</span></div>
  </div>
  <div className="fg"><label>다음 액션</label><textarea value={f.nextAction} onChange={e=>s('nextAction',e.target.value)} placeholder="다음 미팅까지 해야 할 일" rows={2}/></div>
  <div className="fg"><label>🔒 내 메모</label><textarea value={f.memo} onChange={e=>s('memo',e.target.value)} placeholder="비공개 메모" rows={2}/></div>
  {err&&<p className="err">⚠ {err}</p>}
  <button className="btn btn-primary" onClick={doSave}>{isEdit?'수정 저장 ✓':'기록 저장 ✓'}</button>
</div>);
}

/* ═══ HISTORY SCREEN ═══ */
function HistoryScreen({records,nav}){
const months=useMemo(()=>{
  const m={};records.forEach(r=>{const k=r.date.slice(0,7);if(!m[k])m[k]={count:0,members:new Set(),ratios:[]};m[k].count++;m[k].members.add(r.member);m[k].ratios.push(r.talkRatio)});
  return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0])).map(([k,v])=>({key:k,count:v.count,members:v.members.size,avgRatio:Math.round(avg(v.ratios))}));
},[records]);
return(<div className="scr">
  <div className="scr-hdr"><button className="back" onClick={()=>nav('home')}>←</button><span className="scr-title">코칭 성장 히스토리</span></div>
  <div className="sec"><div className="sec-title" style={{marginBottom:12}}>🏅 성장 배지 ({BADGES.filter(b=>b.req(records)).length}/{BADGES.length})</div>
    <div className="gbadge-grid">{BADGES.map(b=>{const ok=b.req(records);return<div key={b.id} className={`gbadge ${ok?'earned':'locked'}`}><span className="gb-icon">{b.icon}</span><span className="gb-name">{b.name}</span><span className="gb-desc">{b.desc}</span></div>})}</div>
  </div>
  <hr className="div"/>
  <div className="sec"><div className="sec-title" style={{marginBottom:14}}>📅 월별 타임라인</div>
    {months.length===0?(<div className="empty"><span className="empty-icon">📈</span><p>기록을 시작해보세요!</p></div>):months.map((m,i)=>(
      <div key={m.key}><div className="tl-item"><div className="tl-dot">{m.count>=5?'⭐':m.count>=3?'🔥':'✓'}</div><div className="tl-body"><div className="tl-month">{m.key.replace('-','년 ')}월</div><div className="tl-stats">{m.count}회 · {m.members}명 · 평균 {m.avgRatio}% 발화</div><div className="prog-wrap" style={{marginTop:6}}><div className="prog-fill" style={{width:`${Math.min(100,m.count/5*100)}%`}}/></div></div></div>{i<months.length-1&&<div className="tl-line"/>}</div>
    ))}
  </div>
  {records.length>0&&<div className="sum-box"><span className="sum-icon">🎯</span><div className="sum-title">총 {records.length}회 코칭</div><div className="sum-sub">{[...new Set(records.map(r=>r.member))].length}명과 함께 · 평균 {Math.round(avg(records.map(r=>r.talkRatio)))}% 발화</div></div>}
</div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
