    <style>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const ADMIN_NAME = "박건우짱";
        const ADMIN_PASSWORD = "1111";

        // Supabase 연동
        const SUPA_URL = 'https://ailyazoaqsdawwbbxbhn.supabase.co';
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpbHlhem9hcXNkYXd3YmJ4YmhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzU3NTYsImV4cCI6MjA5MTc1MTc1Nn0.PtmUJkZWsRJ_fKWWEUQUrA7kc1xaCvwVaj48HKNJIlA';
        const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

        async function loadFromSupabase() {
            const [{ data: uRows }, { data: rRows }] = await Promise.all([
                sb.from('users').select('*'),
                sb.from('records').select('*')
            ]);
            const users = (uRows || []).map(row => ({
                id: row.id, name: row.name, pw: row.pw,
                ...(row.profile || {}),
                loginDates: row.login_dates || [],
                teamSize: (row.profile || {}).memberCount || 0
            }));
            const records = (rRows || []).map(row => ({
                id: row.id, userId: row.user_id, date: row.date,
                ...(row.rec_data || {})
            }));
            return { users, records };
        }

        const BADGES = [
            { id: "first", name: "첫 코칭", req: r => r.length >= 1 },
            { id: "three", name: "3회 달성", req: r => r.length >= 3 },
            { id: "five", name: "5회 달성", req: r => r.length >= 5 },
            { id: "ten", name: "10회 달성", req: r => r.length >= 10 },
            { id: "twenty", name: "20회 달성", req: r => r.length >= 20 },
            { id: "listener", name: "경청 마스터", req: r => r.length >= 3 && avg(r.map(x => x.talkRatio)) <= 30 },
            { id: "deep", name: "심층 코치", req: r => r.filter(x => (x.keyTopic || '').length > 30).length >= 5 },
            { id: "members3", name: "3인 케어", req: r => new Set(r.map(x => x.member)).size >= 3 },
            { id: "members5", name: "5인 케어", req: r => new Set(r.map(x => x.member)).size >= 5 },
            { id: "monthly3", name: "월 3회", req: r => getMaxMonthly(r) >= 3 },
            { id: "monthly5", name: "월 5회", req: r => getMaxMonthly(r) >= 5 },
            { id: "streak2", name: "2개월 연속", req: r => getConsecMonths(r) >= 2 },
            { id: "action", name: "액션 관리자", req: r => r.filter(x => x.nextAction).length >= 5 },
            { id: "quick", name: "스피드 코치", req: r => r.filter(x => x.duration === '10분').length >= 3 },
            { id: "long", name: "딥 다이브", req: r => r.filter(x => x.duration === '30분+').length >= 3 },
        ];

        function avg(a) { return a.length ? a.reduce((x, y) => x + y, 0) / a.length : 0; }
        function getMaxMonthly(r) {
            const c = {};
            r.forEach(x => {
                const k = x.date.slice(0, 7);
                c[k] = (c[k] || 0) + 1;
            });
            return Math.max(0, ...Object.values(c));
        }
        function getConsecMonths(r) {
            const ms = [...new Set(r.map(x => x.date.slice(0, 7)))].sort();
            let mx = 1, cur = 1;
            for (let i = 1; i < ms.length; i++) {
                const [py, pm] = ms[i - 1].split('-').map(Number);
                const [cy, cm] = ms[i].split('-').map(Number);
                if ((cy * 12 + cm) - (py * 12 + pm) === 1) {
                    cur++;
                    mx = Math.max(mx, cur);
                } else cur = 1;
            }
            return mx;
        }

        function getEarnedBadges(records) {
            return BADGES.filter(b => b.req(records)).map(b => b.name);
        }

        function getRankingScore(records, badges) {
            const count = records.length;
            const goodListeners = records.filter(x => x.talkRatio <= 30).length;
            const thisMonth = records.filter(x => x.date.slice(0, 7) === new Date().toISOString().slice(0, 7)).length;
            const maxMonthly = getMaxMonthly(records);
            const loginDays = records.length > 0 ? 7 + records.length : 0;

            let score = count * 10 + goodListeners * 5 + badges.length * 15;
            if (maxMonthly >= 3) score += 30;
            score += loginDays * 20;

            return score;
        }

        function LoginPage({ onLogin }) {
            const [name, setName] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleLogin = () => {
                if (name === ADMIN_NAME && password === ADMIN_PASSWORD) {
                    onLogin();
                } else {
                    setError('관리자 정보가 일치하지 않습니다');
                    setPassword('');
                }
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') handleLogin();
            };

            return (
                <div className="login-container">
                    <div className="login-box">
                        <div className="login-title">🏅 빌캠벨 코칭 허브</div>
                        <div className="login-form">
                            <input
                                type="text"
                                className="login-input"
                                placeholder="관리자명"
                                value={name}
                                onChange={(e) => setName(e.target.value)}
                                onKeyPress={handleKeyPress}
                            />
                            <input
                                type="password"
                                className="login-input"
                                placeholder="비밀번호"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                onKeyPress={handleKeyPress}
                            />
                            <button className="login-button" onClick={handleLogin}>로그인</button>
                            <div className="login-error">{error}</div>
                        </div>
                    </div>
                </div>
            );
        }

        function Dashboard({ onLogout }) {
            const [data, setData] = useState({ users: [], records: [] });
            const [activeTab, setActiveTab] = useState('users');
            const [selectedUserId, setSelectedUserId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [sortBy, setSortBy] = useState('name');

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const d = await loadFromSupabase();
                        setData(d);
                    } catch(e) { console.error('Admin Supabase 오류:', e); }
                };
                loadData();
                const interval = setInterval(loadData, 30000);
                return () => clearInterval(interval);
            }, []);

            const getFilteredAndSortedUsers = () => {
                let filtered = data.users.filter(u => u.name.includes(searchTerm));

                filtered.sort((a, b) => {
                    const aRecords = data.records.filter(r => r.userId === a.id);
                    const bRecords = data.records.filter(r => r.userId === b.id);
                    const aBadges = getEarnedBadges(aRecords).length;
                    const bBadges = getEarnedBadges(bRecords).length;

                    if (sortBy === 'name') return a.name.localeCompare(b.name, 'ko');
                    if (sortBy === 'records') return bRecords.length - aRecords.length;
                    if (sortBy === 'badges') return bBadges - aBadges;
                    return 0;
                });

                return filtered;
            };

            const selectedUser = data.users.find(u => u.id === selectedUserId);
            const userRecords = selectedUserId ? data.records.filter(r => r.userId === selectedUserId) : [];
            const userBadges = getEarnedBadges(userRecords);

            const summaryStats = {
                totalUsers: data.users.length,
                totalRecords: data.records.length,
                totalBadges: data.users.reduce((sum, u) => {
                    const uRecords = data.records.filter(r => r.userId === u.id);
                    return sum + getEarnedBadges(uRecords).length;
                }, 0),
                monthlyActivityRate: data.users.length > 0 ? (
                    (data.users.filter(u => {
                        const uRecords = data.records.filter(r => r.userId === u.id);
                        return uRecords.some(r => r.date.slice(0, 7) === new Date().toISOString().slice(0, 7));
                    }).length / data.users.length) * 100
                ).toFixed(1) : 0
            };

            const getMonthlyData = () => {
                const months = {};
                userRecords.forEach(r => {
                    const m = r.date.slice(0, 7);
                    months[m] = (months[m] || 0) + 1;
                });
                const allMonths = [];
                const now = new Date();
                for (let i = 11; i >= 0; i--) {
                    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                    const k = d.toISOString().slice(0, 7);
                    allMonths.push(months[k] || 0);
                }
                const maxVal = Math.max(...allMonths) || 1;
                return allMonths.map(v => (v / maxVal) * 100);
            };

            const getUserActivitySummary = () => {
                const loginDays = userRecords.length;
                const thisMonth = userRecords.filter(r => r.date.slice(0, 7) === new Date().toISOString().slice(0, 7)).length;
                const avgTalkRatio = userRecords.length > 0 ? (userRecords.reduce((sum, r) => sum + (r.talkRatio || 0), 0) / userRecords.length).toFixed(1) : 0;
                const targetMonthly = selectedUser ? (selectedUser.level === '상급' ? selectedUser.teamSize * 4 : selectedUser.level === '중급' ? selectedUser.teamSize * 2 : selectedUser.teamSize) : 0;
                const monthlyTargetPercent = targetMonthly > 0 ? ((thisMonth / targetMonthly) * 100).toFixed(1) : 0;

                return { loginDays, thisMonth, avgTalkRatio, monthlyTargetPercent, targetMonthly };
            };

            const activitySummary = getUserActivitySummary();
            const monthlyHeights = getMonthlyData();

            const getRankingData = () => {
                return data.users.map(u => {
                    const uRecords = data.records.filter(r => r.userId === u.id);
                    const badges = getEarnedBadges(uRecords);
                    const score = getRankingScore(uRecords, badges);
                    const targetMonthly = u.level === '상급' ? u.teamSize * 4 : u.level === '중급' ? u.teamSize * 2 : u.teamSize;
                    return { user: u, records: uRecords, badges, score, targetMonthly };
                }).sort((a, b) => b.score - a.score);
            };

            const rankingData = getRankingData();

            return (
                <div className="dashboard-container">
                    <div className="dashboard-header">
                        <div className="header-title">🏅 빌캠벨 코칭 허브 · Admin Console</div>
                        <div className="header-user">
                            <span>{ADMIN_NAME}</span>
                            <button className="logout-button" onClick={onLogout}>로그아웃</button>
                        </div>
                    </div>

                    <div className="summary-cards">
                        <div className="summary-card">
                            <div className="card-icon">👥</div>
                            <div className="card-value">{summaryStats.totalUsers}</div>
                            <div className="card-label">총 가입자</div>
                        </div>
                        <div className="summary-card">
                            <div className="card-icon">📝</div>
                            <div className="card-value">{summaryStats.totalRecords}</div>
                            <div className="card-label">총 기록 수</div>
                        </div>
                        <div className="summary-card">
                            <div className="card-icon">🏅</div>
                            <div className="card-value">{summaryStats.totalBadges}</div>
                            <div className="card-label">총 배지 수</div>
                        </div>
                        <div className="summary-card">
                            <div className="card-icon">📊</div>
                            <div className="card-value">{summaryStats.monthlyActivityRate}%</div>
                            <div className="card-label">이번 달 활동률</div>
                        </div>
                    </div>

                    <div className="tab-container">
                        <div className="tab-buttons">
                            <button
                                className={`tab-button ${activeTab === 'users' ? 'active' : ''}`}
                                onClick={() => setActiveTab('users')}
                            >
                                📋 사용자 목록
                            </button>
                            <button
                                className={`tab-button ${activeTab === 'ranking' ? 'active' : ''}`}
                                onClick={() => setActiveTab('ranking')}
                            >
                                🏆 코칭왕 랭킹
                            </button>
                        </div>

                        <div className="tab-content" style={{ display: activeTab === 'users' ? 'block' : 'none' }}>
                            {data.users.length === 0 ? (
                                <div className="empty-state">등록된 사용자가 없습니다.</div>
                            ) : (
                                <div className="user-list-panel">
                                    <div className="user-list-left">
                                        <input
                                            type="text"
                                            className="search-input"
                                            placeholder="사용자명 검색..."
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                        />
                                        <select className="sort-select" value={sortBy} onChange={(e) => setSortBy(e.target.value)}>
                                            <option value="name">이름순</option>
                                            <option value="records">기록순</option>
                                            <option value="badges">배지순</option>
                                        </select>
                                        <div className="user-items">
                                            {getFilteredAndSortedUsers().map(u => {
                                                const uRecords = data.records.filter(r => r.userId === u.id);
                                                const uBadges = getEarnedBadges(uRecords);
                                                return (
                                                    <div
                                                        key={u.id}
                                                        className={`user-item ${selectedUserId === u.id ? 'active' : ''}`}
                                                        onClick={() => setSelectedUserId(u.id)}
                                                    >
                                                        <div className="user-item-name">{u.name}</div>
                                                        {uBadges.length > 0 && (
                                                            <div className="user-item-badges">
                                                                {uBadges.slice(0, 3).map((badge, i) => (
                                                                    <span key={i} className="badge-tiny">{badge.slice(0, 3)}</span>
                                                                ))}
                                                                {uBadges.length > 3 && <span className="badge-tiny">+{uBadges.length - 3}</span>}
                                                            </div>
                                                        )}
                                                        <div className="user-item-records">📝 {uRecords.length}건</div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {selectedUser ? (
                                        <div className="user-detail">
                                            <div className="detail-section">
                                                <div className="detail-title">프로필</div>
                                                <div className="detail-item">
                                                    <span className="detail-label">이름</span>
                                                    <span className="detail-value">{selectedUser.name}</span>
                                                </div>
                                                <div className="detail-item">
                                                    <span className="detail-label">비밀번호</span>
                                                    <span className="detail-value" style={{fontFamily:'monospace',background:'#1a1a2e',padding:'2px 8px',borderRadius:6,letterSpacing:1}}>{selectedUser.pw}</span>
                                                </div>
                                                <div className="detail-item">
                                                    <span className="detail-label">회사</span>
                                                    <span className="detail-value">{selectedUser.company}</span>
                                                </div>
                                                <div className="detail-item">
                                                    <span className="detail-label">팀</span>
                                                    <span className="detail-value">{selectedUser.team}</span>
                                                </div>
                                                <div className="detail-item">
                                                    <span className="detail-label">팀 규모</span>
                                                    <span className="detail-value">{selectedUser.teamSize}명</span>
                                                </div>
                                                <div className="detail-item">
                                                    <span className="detail-label">레벨</span>
                                                    <span className="detail-value">{selectedUser.level}</span>
                                                </div>
                                                <div className="detail-item">
                                                    <span className="detail-label">직급</span>
                                                    <span className="detail-value">{selectedUser.position}</span>
                                                </div>
                                                <div className="detail-item">
                                                    <span className="detail-label">가입일</span>
                                                    <span className="detail-value">{selectedUser.joinDate}</span>
                                                </div>
                                            </div>

                                            <div className="detail-section">
                                                <div className="detail-title">활동 요약</div>
                                                <div className="detail-item">
                                                    <span className="detail-label">총 접속일수</span>
                                                    <span className="detail-value">{activitySummary.loginDays}일</span>
                                                </div>
                                                <div className="detail-item">
                                                    <span className="detail-label">총 기록횟수</span>
                                                    <span className="detail-value">{userRecords.length}회</span>
                                                </div>
                                                <div className="detail-item">
                                                    <span className="detail-label">이번달 기록</span>
                                                    <span className="detail-value">{activitySummary.thisMonth}회</span>
                                                </div>
                                                <div className="detail-item">
                                                    <span className="detail-label">평균 말하기비율</span>
                                                    <span className="detail-value">{activitySummary.avgTalkRatio}%</span>
                                                </div>
                                                <div className="detail-item">
                                                    <span className="detail-label">이번달 목표</span>
                                                    <span className="detail-value">{activitySummary.monthlyTargetPercent}%</span>
                                                </div>
                                                <div className="detail-item">
                                                    <span className="detail-label">배지 수</span>
                                                    <span className="detail-value">{userBadges.length}개</span>
                                                </div>
                                                <div style={{ marginTop: '12px' }}>
                                                    <div className="target-bar">
                                                        <div className="target-fill" style={{ width: `${Math.min(activitySummary.monthlyTargetPercent, 100)}%` }}>
                                                            {activitySummary.monthlyTargetPercent}%
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            {userBadges.length > 0 && (
                                                <div className="detail-section">
                                                    <div className="detail-title">획득 배지</div>
                                                    <div className="badge-list">
                                                        {userBadges.map((badge, i) => (
                                                            <div key={i} className="badge-item">{badge}</div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {monthlyHeights.length > 0 && (
                                                <div className="detail-section">
                                                    <div className="detail-title">월별 기록</div>
                                                    <div className="monthly-chart">
                                                        {monthlyHeights.map((h, i) => (
                                                            <div key={i} className="monthly-bar" style={{ height: `${h || 4}%` }}></div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {userRecords.length > 0 && (
                                                <div className="detail-section">
                                                    <div className="detail-title">최근 기록 (상위 5)</div>
                                                    <div className="recent-records">
                                                        {userRecords.slice(-5).reverse().map((record, i) => (
                                                            <div key={i} className="record-item">
                                                                <div className="record-item-date">{record.date} ({record.duration})</div>
                                                                <div className="record-item-member">{record.member} {record.mood}</div>
                                                                <div className="record-item-topic">{record.keyTopic || 'N/A'}</div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="empty-state">사용자를 선택하세요</div>
                                    )}
                                </div>
                            )}
                        </div>

                        <div className="tab-content" style={{ display: activeTab === 'ranking' ? 'block' : 'none' }}>
                            <div className="ranking-container">
                                {rankingData.length > 0 && (
                                    <>
                                        <div className="ranking-top3">
                                            {rankingData.slice(0, 3).map((item, idx) => {
                                                const medals = ['🥇', '🥈', '🥉'];
                                                const thisMonth = item.records.filter(r => r.date.slice(0, 7) === new Date().toISOString().slice(0, 7)).length;
                                                const targetPercent = item.targetMonthly > 0 ? ((thisMonth / item.targetMonthly) * 100).toFixed(1) : 0;
                                                return (
                                                    <div key={idx} className="ranking-card">
                                                        <div className="ranking-medal">{medals[idx]}</div>
                                                        <div className="ranking-name">{item.user.name}</div>
                                                        <div className="ranking-company">{item.user.company}</div>
                                                        <div className="ranking-stats">
                                                            <div className="ranking-stat">
                                                                <div className="ranking-stat-value">{item.records.length}</div>
                                                                <div className="ranking-stat-label">기록</div>
                                                            </div>
                                                            <div className="ranking-stat">
                                                                <div className="ranking-stat-value">{item.badges.length}</div>
                                                                <div className="ranking-stat-label">배지</div>
                                                            </div>
                                                        </div>
                                                        <div className="target-bar">
                                                            <div className="target-fill" style={{ width: `${Math.min(targetPercent, 100)}%` }}>
                                                                {targetPercent}%
                                                            </div>
                                                        </div>
                                                        <div className="ranking-score" style={{ marginTop: '16px' }}>{item.score}</div>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        {rankingData.length > 3 && (
                                            <div className="ranking-rows">
                                                {rankingData.slice(3).map((item, idx) => {
                                                    const thisMonth = item.records.filter(r => r.date.slice(0, 7) === new Date().toISOString().slice(0, 7)).length;
                                                    const targetPercent = item.targetMonthly > 0 ? ((thisMonth / item.targetMonthly) * 100).toFixed(1) : 0;
                                                    return (
                                                        <div key={idx} className="ranking-row top">
                                                            <div className="rank-number">{idx + 4}</div>
                                                            <div className="ranking-info">
                                                                <div className="ranking-info-name">{item.user.name}</div>
                                                                <div className="ranking-info-company">{item.user.company}</div>
                                                            </div>
                                                            <div className="ranking-cell">{item.score}</div>
                                                            <div className="ranking-cell">{item.records.length}회</div>
                                                            <div className="ranking-cell">{item.badges.length}개</div>
                                                            <div className="ranking-cell">{targetPercent}%</div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </>
                                )}
                                {rankingData.length === 0 && <div className="empty-state">랭킹 데이터가 없습니다.</div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);

            return isLoggedIn ? (
                <Dashboard onLogout={() => setIsLoggedIn(false)} />
            ) : (
                <LoginPage onLogin={() => setIsLoggedIn(true)} />
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
